name: Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            asset_suffix: windows-x64
          - os: macos-latest
            target: bun-darwin-arm64
            archive: tar.gz
            asset_suffix: darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            archive: tar.gz
            asset_suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build distribution
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          EXE_NAME="machine-violet"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXE_NAME="machine-violet.exe"
          fi

          # Windows-specific flags (use array to preserve quoting)
          WIN_FLAGS=()
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            WIN_FLAGS=(
              "--windows-icon=assets/machine-violet.ico"
              "--windows-title=Machine Violet"
              "--windows-description=AI Dungeon Master for tabletop RPGs"
              "--windows-version=${VERSION}.0"
            )
          fi

          # Compile
          bun build --compile \
            --target=${{ matrix.target }} \
            --outfile "dist/$EXE_NAME" \
            --define "process.env.MV_VERSION='$VERSION'" \
            "${WIN_FLAGS[@]}" \
            src/index.tsx

          # Copy assets
          cp -r src/prompts dist/prompts
          cp -r src/tui/themes/assets dist/themes
          cp -r systems dist/systems

          # Version file
          echo "{\"version\":\"$VERSION\"}" > dist/version.json

          # License
          if [ -f LICENSE ]; then cp LICENSE dist/; fi

      - name: Bundle Windows Terminal portable
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Download Windows Terminal portable ZIP from GitHub releases.
          # Pin to a known stable version; update periodically.
          WT_VERSION="1.24.10621.0"
          WT_TAG="v${WT_VERSION}"
          WT_ZIP="Microsoft.WindowsTerminal_${WT_VERSION}_x64.zip"
          WT_URL="https://github.com/microsoft/terminal/releases/download/${WT_TAG}/${WT_ZIP}"

          echo "Downloading Windows Terminal portable ${WT_VERSION}..."
          curl -fSL -o wt-portable.zip "$WT_URL"

          # Verify integrity (update hash when bumping WT_VERSION)
          WT_SHA256="SET_AFTER_FIRST_SUCCESSFUL_BUILD"
          if [ "$WT_SHA256" != "SET_AFTER_FIRST_SUCCESSFUL_BUILD" ]; then
            echo "$WT_SHA256  wt-portable.zip" | sha256sum -c -
          else
            echo "WARNING: SHA256 not pinned yet — skipping verification"
            sha256sum wt-portable.zip
          fi

          # Extract into dist/terminal/
          mkdir -p dist/terminal
          unzip -q wt-portable.zip -d dist/terminal

          # Enable portable mode (settings stored next to exe, not in %APPDATA%)
          touch dist/terminal/.portable

          # Include Windows Terminal's MIT license (third-party notice)
          if [ -f dist/terminal/LICENSE ]; then
            mv dist/terminal/LICENSE dist/terminal/LICENSE-windows-terminal.txt
          fi

          echo "Bundled Windows Terminal ${WT_VERSION} ($(du -sh dist/terminal | cut -f1))"

      - name: Azure login (OIDC)
        if: matrix.os == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binary
        if: matrix.os == 'windows-latest'
        uses: azure/trusted-signing-action@v1
        with:
          endpoint: https://wus2.codesigning.azure.net
          signing-account-name: mvcodesigning
          certificate-profile-name: mv-public-trust
          files: ${{ github.workspace }}/dist/machine-violet.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Install Velopack
        if: matrix.os == 'windows-latest'
        run: dotnet tool install -g vpk

      - name: Package (Velopack — Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          vpk pack \
            --packId MachineViolet \
            --packVersion "$VERSION" \
            --packTitle "Machine Violet" \
            --packDir dist \
            --mainExe machine-violet.exe \
            --icon assets/machine-violet.ico \
            --outputDir velopack-out

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          tar -czf "machine-violet-${VERSION}-${{ matrix.asset_suffix }}.tar.gz" -C dist .

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: machine-violet-${{ matrix.asset_suffix }}
          path: velopack-out/*

      - name: Upload artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: machine-violet-${{ matrix.asset_suffix }}
          path: machine-violet-*.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            MachineViolet-*
            machine-violet-*
            releases.win.json

