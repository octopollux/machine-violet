name: Release

on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_suffix: windows-x64
          - os: macos-latest
            archive: tar.gz
            asset_suffix: darwin-arm64
          - os: ubuntu-latest
            archive: tar.gz
            asset_suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Build distribution
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          node scripts/build-dist.js --version="$VERSION"

      - name: Bundle Windows Terminal portable
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Download Windows Terminal portable ZIP from GitHub releases.
          # Pin to a known stable version; update periodically.
          WT_VERSION="1.24.10621.0"
          WT_TAG="v${WT_VERSION}"
          WT_ZIP="Microsoft.WindowsTerminal_${WT_VERSION}_x64.zip"
          WT_URL="https://github.com/microsoft/terminal/releases/download/${WT_TAG}/${WT_ZIP}"

          echo "Downloading Windows Terminal portable ${WT_VERSION}..."
          curl -fSL -o wt-portable.zip "$WT_URL"

          # Verify integrity (update hash when bumping WT_VERSION)
          WT_SHA256="SET_AFTER_FIRST_SUCCESSFUL_BUILD"
          if [ "$WT_SHA256" != "SET_AFTER_FIRST_SUCCESSFUL_BUILD" ]; then
            echo "$WT_SHA256  wt-portable.zip" | sha256sum -c -
          else
            echo "WARNING: SHA256 not pinned yet — skipping verification"
            sha256sum wt-portable.zip
          fi

          # Extract into dist/terminal/
          mkdir -p dist/terminal
          unzip -q wt-portable.zip -d dist/terminal

          # Enable portable mode (settings stored next to exe, not in %APPDATA%)
          touch dist/terminal/.portable

          # Include Windows Terminal's MIT license (third-party notice)
          if [ -f dist/terminal/LICENSE ]; then
            mv dist/terminal/LICENSE dist/terminal/LICENSE-windows-terminal.txt
          fi

          echo "Bundled Windows Terminal ${WT_VERSION} ($(du -sh dist/terminal | cut -f1))"

      - name: Azure login (OIDC)
        if: matrix.os == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Velopack
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Package and sign (Velopack — Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          vpk pack \
            --packId MachineViolet \
            --packVersion "$VERSION" \
            --packTitle "Machine Violet" \
            --packDir dist \
            --mainExe machine-violet.exe \
            --icon assets/machine-violet.ico \
            --shortcuts StartMenuRoot \
            --azureTrustedSignFile assets/trusted-signing.json \
            --outputDir velopack-out

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          tar -czf "machine-violet-${VERSION}-${{ matrix.asset_suffix }}.tar.gz" -C dist .

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: machine-violet-${{ matrix.asset_suffix }}
          path: velopack-out/*

      - name: Upload artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: machine-violet-${{ matrix.asset_suffix }}
          path: machine-violet-*.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          # Generate changelog from GitHub
          CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" --jq '.body' 2>/dev/null || echo "")

          cat > release-body.md << BODYEOF
          ## Download

          ### Windows
          | | File |
          |---|---|
          | **Installer** (recommended) | [\`MachineViolet-Setup.exe\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/MachineViolet-Setup.exe) |
          | Portable (no install) | [\`MachineViolet-Portable.zip\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/MachineViolet-Portable.zip) |

          ### macOS (Apple Silicon)
          | | File |
          |---|---|
          | Tarball | [\`machine-violet-${VERSION}-darwin-arm64.tar.gz\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/machine-violet-${VERSION}-darwin-arm64.tar.gz) |

          ### Linux (x64)
          | | File |
          |---|---|
          | Tarball | [\`machine-violet-${VERSION}-linux-x64.tar.gz\`](https://github.com/${{ github.repository }}/releases/download/${TAG}/machine-violet-${VERSION}-linux-x64.tar.gz) |

          Also available via Homebrew: \`brew install octopollux/mv-tap/machine-violet\`

          ---

          ${CHANGELOG}
          BODYEOF
          sed -i 's/^          //' release-body.md

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Machine Violet ${VERSION}" \
            --notes-file release-body.md \
            MachineViolet-* \
            machine-violet-* \
            releases.win.json
