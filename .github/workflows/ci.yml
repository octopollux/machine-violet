name: CI

on:
  push:
    branches: [main, two-tiers]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24, 25]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Build shared package first (engine and client-ink depend on it)
      - name: Build shared
        run: npm run build -w packages/shared

      - name: Lint
        run: npm run lint

      # Root project tests (monolith — 2117 tests)
      - name: Test (root)
        run: npm test

      # Engine package tests (server + engine — 1267 tests)
      - name: Test (engine)
        run: npm test -w packages/engine

      # Client-ink package tests (event handler + TUI — 634 tests)
      - name: Test (client-ink)
        run: npm test -w packages/client-ink

      - name: Coverage threshold
        if: matrix.node-version == 25
        run: npm run test:coverage
