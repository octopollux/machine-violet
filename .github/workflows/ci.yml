name: CI

on:
  push:
    branches: [main, two-tiers]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      # Build shared package first (engine and client-ink depend on it)
      - name: Build shared
        run: npm run build -w packages/shared

      - name: Lint
        run: npm run lint

      # Engine package tests (server + game engine — 1265 tests)
      - name: Test (engine)
        run: npm test -w packages/engine

      # Client-ink package tests (TUI + event handler — 656 tests)
      - name: Test (client-ink)
        run: npm test -w packages/client-ink
