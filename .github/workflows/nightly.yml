name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.timestamp }}
      nightly_version: ${{ steps.ts.outputs.nightly_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute nightly version
        id: ts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date -u +%Y%m%d-%H%M)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "nightly_version=${VERSION}-nightly.${TIMESTAMP}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_suffix: windows-x64
          - os: macos-latest
            archive: tar.gz
            asset_suffix: darwin-arm64
          - os: ubuntu-latest
            archive: tar.gz
            asset_suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Build distribution
        shell: bash
        run: |
          node scripts/build-dist.js --version="${{ needs.prepare.outputs.nightly_version }}"

      - name: Bundle Windows Terminal portable
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Download Windows Terminal portable ZIP from GitHub releases.
          # Pin to a known stable version; update periodically.
          WT_VERSION="1.24.10621.0"
          WT_TAG="v${WT_VERSION}"
          WT_ZIP="Microsoft.WindowsTerminal_${WT_VERSION}_x64.zip"
          WT_URL="https://github.com/microsoft/terminal/releases/download/${WT_TAG}/${WT_ZIP}"

          echo "Downloading Windows Terminal portable ${WT_VERSION}..."
          curl -fSL -o wt-portable.zip "$WT_URL"

          # Verify integrity (update hash when bumping WT_VERSION)
          WT_SHA256="SET_AFTER_FIRST_SUCCESSFUL_BUILD"
          if [ "$WT_SHA256" != "SET_AFTER_FIRST_SUCCESSFUL_BUILD" ]; then
            echo "$WT_SHA256  wt-portable.zip" | sha256sum -c -
          else
            echo "WARNING: SHA256 not pinned yet — skipping verification"
            sha256sum wt-portable.zip
          fi

          # Extract into dist/terminal/
          mkdir -p dist/terminal
          unzip -q wt-portable.zip -d dist/terminal

          # Enable portable mode (settings stored next to exe, not in %APPDATA%)
          touch dist/terminal/.portable

          # Include Windows Terminal's MIT license (third-party notice)
          if [ -f dist/terminal/LICENSE ]; then
            mv dist/terminal/LICENSE dist/terminal/LICENSE-windows-terminal.txt
          fi

          echo "Bundled Windows Terminal ${WT_VERSION} ($(du -sh dist/terminal | cut -f1))"

      - name: Azure login (OIDC)
        if: matrix.os == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Velopack
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Package and sign (Velopack — Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          vpk pack \
            --packId MachineViolet \
            --packVersion "${{ needs.prepare.outputs.nightly_version }}" \
            --packTitle "Machine Violet" \
            --packDir dist \
            --mainExe machine-violet.exe \
            --icon assets/machine-violet.ico \
            --shortcuts StartMenuRoot \
            --azureTrustedSignFile assets/trusted-signing.json \
            --channel nightly \
            --outputDir velopack-out

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "machine-violet-nightly-${{ matrix.asset_suffix }}.tar.gz" -C dist .

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: machine-violet-${{ matrix.asset_suffix }}
          path: velopack-out/*

      - name: Upload artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: machine-violet-${{ matrix.asset_suffix }}
          path: machine-violet-nightly-*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute nightly tag and find previous
        id: tags
        run: |
          TIMESTAMP="${{ needs.prepare.outputs.timestamp }}"
          NIGHTLY_TAG="nightly-${TIMESTAMP}"

          # Guard against tag collision on rerun
          if git rev-parse "$NIGHTLY_TAG" >/dev/null 2>&1; then
            NIGHTLY_TAG="${NIGHTLY_TAG}-${{ github.run_id }}"
          fi

          echo "tag=$NIGHTLY_TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

          # Find the most recent nightly-* tag (if any)
          PREV_TAG=$(git tag -l 'nightly-*' --sort=-version:refname | head -n1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            # Fall back to most recent v* tag
            PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | head -n1 || echo "")
          fi
          echo "prev=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            echo "Changelog range: ${PREV_TAG}..HEAD"
          else
            echo "No previous tag found — first nightly"
          fi

      - name: Create dated nightly tag
        run: |
          git tag "${{ steps.tags.outputs.tag }}"
          git push origin "${{ steps.tags.outputs.tag }}"

      - name: Collect commits for changelog
        id: commits
        run: |
          PREV="${{ steps.tags.outputs.prev }}"
          if [ -n "$PREV" ]; then
            COMMITS=$(git log --oneline "${PREV}..HEAD")
          else
            COMMITS="Initial nightly build."
          fi
          echo "log<<COMMITS_EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "COMMITS_EOF" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: changelog
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.MV_RELEASE_NOTES_ANT_APIKEY }}
          prompt: |
            Write release notes for a nightly build of Machine Violet, an AI
            Dungeon Master that runs tabletop RPGs in a terminal.

            These notes are for PLAYERS, not engineers. Rules:
            - Omit internal/boring commits: dependency bumps (Dependabot),
              CI changes, refactoring, docs-only changes.
            - Collapse multiple performance commits into one
              "Performance improvements" bullet.
            - Describe user-facing bug fixes and features in plain,
              friendly language a player would understand.
            - A few concise bullet points in markdown. No heading, no preamble.
            - If there are genuinely no player-facing changes, output exactly:
              "Internal improvements and maintenance."

            Commits since last nightly (${{ steps.tags.outputs.prev }}):
            ```
            ${{ steps.commits.outputs.log }}
            ```

            Output ONLY the markdown bullet list — nothing else.

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing rolling nightly release (if any)
          gh release delete nightly --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin nightly 2>/dev/null || true

          DATE="${{ steps.tags.outputs.date }}"
          NIGHTLY_TAG="${{ steps.tags.outputs.tag }}"
          PREV_TAG="${{ steps.tags.outputs.prev }}"
          RELEASE_NOTES="${{ steps.changelog.outputs.result }}"

          cat > nightly-body.md << 'BODYEOF'
          ## Download

          ### Windows
          | | File |
          |---|---|
          | **Installer** (recommended) | [`MachineViolet-nightly-Setup.exe`](https://github.com/octopollux/machine-violet/releases/download/nightly/MachineViolet-nightly-Setup.exe) |
          | Portable (no install) | [`MachineViolet-nightly-Portable.zip`](https://github.com/octopollux/machine-violet/releases/download/nightly/MachineViolet-nightly-Portable.zip) |

          ### macOS (Apple Silicon)
          | | File |
          |---|---|
          | Tarball | [`machine-violet-nightly-darwin-arm64.tar.gz`](https://github.com/octopollux/machine-violet/releases/download/nightly/machine-violet-nightly-darwin-arm64.tar.gz) |

          ### Linux (x64)
          | | File |
          |---|---|
          | Tarball | [`machine-violet-nightly-linux-x64.tar.gz`](https://github.com/octopollux/machine-violet/releases/download/nightly/machine-violet-nightly-linux-x64.tar.gz) |

          Also available via Homebrew: `brew install octopollux/mv-tap/machine-violet`
          BODYEOF
          sed -i 's/^          //' nightly-body.md

          # Append release notes safely (no shell expansion of AI content)
          {
            echo ""
            echo "---"
            echo ""
            echo "## What's New"
            echo ""
            printf '%s\n' "$RELEASE_NOTES"
            echo ""
            echo "---"
            echo ""
            echo "Automated nightly build from \`main\` · [\`${NIGHTLY_TAG}\`](https://github.com/octopollux/machine-violet/releases/tag/${NIGHTLY_TAG}). **Not a stable release.**"
          } >> nightly-body.md

          gh release create nightly \
            --repo ${{ github.repository }} \
            --title "Nightly ($DATE)" \
            --notes-file nightly-body.md \
            --prerelease \
            --target main \
            artifacts/MachineViolet-* \
            artifacts/machine-violet-nightly-* \
            artifacts/releases.nightly.json \
            artifacts/assets.nightly.json

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_NIGHTLY_WEBHOOK }}
        run: |
          NIGHTLY_TAG="${{ steps.tags.outputs.tag }}"
          RELEASE_NOTES="${{ steps.changelog.outputs.result }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/nightly"

          # Build message, truncating to fit Discord's 2000-char limit
          HEADER="**Machine Violet Nightly** · \`${NIGHTLY_TAG}\`"
          FOOTER="🔗 ${RELEASE_URL}"
          # Reserve space for header + footer + newlines
          MAX_NOTES_LEN=$((2000 - ${#HEADER} - ${#FOOTER} - 10))
          if [ ${#RELEASE_NOTES} -gt $MAX_NOTES_LEN ]; then
            RELEASE_NOTES="${RELEASE_NOTES:0:$((MAX_NOTES_LEN - 3))}..."
          fi

          MSG="$(printf '%s\n\n%s\n\n%s' "$HEADER" "$RELEASE_NOTES" "$FOOTER")"

          # Suppress @everyone/@here/role mentions
          jq -n \
            --arg content "$MSG" \
            '{content: $content, allowed_mentions: {parse: []}}' > discord-payload.json

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK"

      - name: Prune old nightly tags
        run: |
          # Delete nightly-* tags older than 30 days
          CUTOFF=$(date -u -d '30 days ago' +%Y%m%d)
          for tag in $(git tag -l 'nightly-*'); do
            # Extract YYYYMMDD from nightly-YYYYMMDD-HHMM
            TAG_DATE=$(echo "$tag" | sed 's/nightly-\([0-9]\{8\}\).*/\1/')
            if [ "$TAG_DATE" -lt "$CUTOFF" ] 2>/dev/null; then
              echo "Pruning $tag"
              git push --delete origin "$tag" 2>/dev/null || true
              git tag -d "$tag" 2>/dev/null || true
            fi
          done

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          DARWIN_URL="https://github.com/octopollux/machine-violet/releases/download/nightly/machine-violet-nightly-darwin-arm64.tar.gz"
          LINUX_URL="https://github.com/octopollux/machine-violet/releases/download/nightly/machine-violet-nightly-linux-x64.tar.gz"

          DARWIN_SHA=$(curl -fsSL "$DARWIN_URL" | sha256sum | cut -d' ' -f1)
          LINUX_SHA=$(curl -fsSL "$LINUX_URL" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/octopollux/homebrew-mv-tap.git" tap
          cd tap

          cat > Formula/machine-violet.rb << 'FORMULA'
          class MachineViolet < Formula
            desc "AI Dungeon Master for tabletop RPGs"
            homepage "https://github.com/octopollux/machine-violet"
            version "nightly"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/octopollux/machine-violet/releases/download/nightly/machine-violet-nightly-darwin-arm64.tar.gz"
                sha256 "DARWIN_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/octopollux/machine-violet/releases/download/nightly/machine-violet-nightly-linux-x64.tar.gz"
                sha256 "LINUX_SHA_PLACEHOLDER"
              end
            end

            def install
              libexec.install "machine-violet"
              libexec.install "prompts" if Dir.exist?("prompts")
              libexec.install "themes" if Dir.exist?("themes")
              libexec.install "systems" if Dir.exist?("systems")

              chmod 0755, libexec/"machine-violet"
              bin.write_exec_script libexec/"machine-violet"
            end

            test do
              assert_match "machine-violet", shell_output("#{bin}/machine-violet --version")
            end
          end
          FORMULA

          sed -i "s/DARWIN_SHA_PLACEHOLDER/${DARWIN_SHA}/g" Formula/machine-violet.rb
          sed -i "s/LINUX_SHA_PLACEHOLDER/${LINUX_SHA}/g" Formula/machine-violet.rb
          sed -i 's/^          //' Formula/machine-violet.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/machine-violet.rb
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update machine-violet nightly ($(date -u +%Y-%m-%d))" && git push)
