name: Test Build

on:
  workflow_dispatch:
    inputs:
      windows:
        description: "Build Windows (installer + signing)"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: false
      linux:
        description: "Build Linux"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  build-windows:
    if: inputs.windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build distribution
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DATE="$(date -u +'%Y-%m-%d %H:%M')"
          node scripts/build-dist.js --version="${VERSION}-test" --release-date="$RELEASE_DATE"

      - name: Bundle Windows Terminal portable
        shell: bash
        run: |
          WT_VERSION="1.25.622.0"
          WT_TAG="v${WT_VERSION}"
          WT_ZIP="Microsoft.WindowsTerminalPreview_${WT_VERSION}_x64.zip"
          WT_URL="https://github.com/microsoft/terminal/releases/download/${WT_TAG}/${WT_ZIP}"
          curl -fSL -o wt-portable.zip "$WT_URL"
          # Verify integrity (update hash when bumping WT_VERSION)
          WT_SHA256="ba5b75eb769e99221e68fe4bfb3580ed1ade81f24b70334de4cb4742edf1b017"
          echo "$WT_SHA256  wt-portable.zip" | sha256sum -c -
          mkdir -p dist/terminal
          unzip -q wt-portable.zip -d dist/terminal
          touch dist/terminal/.portable
          if [ -f dist/terminal/LICENSE ]; then
            mv dist/terminal/LICENSE dist/terminal/LICENSE-windows-terminal.txt
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Velopack
        shell: bash
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Package and sign (Velopack)
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          vpk pack \
            --packId MachineViolet \
            --packVersion "${VERSION}-test" \
            --packTitle "Machine Violet" \
            --packDir dist \
            --mainExe MachineViolet.exe \
            --icon assets/machine-violet.ico \
            --shortcuts StartMenuRoot \
            --azureTrustedSignFile assets/trusted-signing.json \
            --channel test \
            --outputDir velopack-out

      # Validate the packaged-artifact gate end-to-end (the same scripts
      # release.yml / nightly.yml run). Both legs are blocking here and in
      # release/nightly — a dispatch here exercises the Windows signing + pack
      # path that the OIDC trust boundary keeps off feature branches. See
      # docs/e2e-harness.md.
      - name: Replay goldens against the packaged binary
        shell: bash
        run: bash scripts/ci/replay-packaged-binary.sh velopack-out

      - name: Velopack install/uninstall smoke
        shell: pwsh
        run: scripts/ci/velopack-install-smoke.ps1 -ArtifactDir velopack-out -RepoRoot .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-build-windows-x64
          path: velopack-out/*

  build-macos:
    if: inputs.macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build distribution
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DATE="$(date -u +'%Y-%m-%d %H:%M')"
          node scripts/build-dist.js --version="${VERSION}-test" --release-date="$RELEASE_DATE"

      - name: Package
        run: tar -czf machine-violet-test-darwin-arm64.tar.gz -C dist .

      - name: Replay goldens against the packaged binary
        run: |
          mkdir -p pkg && cp machine-violet-test-darwin-arm64.tar.gz pkg/
          bash scripts/ci/replay-packaged-binary.sh pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-build-darwin-arm64
          path: machine-violet-test-darwin-arm64.tar.gz

  build-linux:
    if: inputs.linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build distribution
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DATE="$(date -u +'%Y-%m-%d %H:%M')"
          node scripts/build-dist.js --version="${VERSION}-test" --release-date="$RELEASE_DATE"

      - name: Package
        run: tar -czf machine-violet-test-linux-x64.tar.gz -C dist .

      - name: Replay goldens against the packaged binary
        run: |
          mkdir -p pkg && cp machine-violet-test-linux-x64.tar.gz pkg/
          bash scripts/ci/replay-packaged-binary.sh pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-build-linux-x64
          path: machine-violet-test-linux-x64.tar.gz
