name: Cut Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (skip tag push)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      dry_run: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          OLD_VERSION=$(node -p "require('./package.json').version")
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "old=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Version: $OLD_VERSION → $NEW_VERSION"

      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "Release v${{ steps.bump.outputs.new }}"
          git tag "v${{ steps.bump.outputs.new }}"

      - name: Push
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.new }}"
          echo ""
          echo "Tagged v${{ steps.bump.outputs.new }} — release build starting."

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run — no push."
          echo "Would have tagged: v${{ steps.bump.outputs.new }}"
          git log --oneline -1

  build-and-release:
    needs: tag
    if: ${{ !inputs.dry_run }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      tag: ${{ needs.tag.outputs.tag }}
