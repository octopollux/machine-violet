# Git hooks (lefthook), matched to the e2e tiers — see docs/e2e-harness.md "Hooks".
#
#   pre-commit — fast + offline. Lint (cached) + Tier-1/unit tests for the
#                staged files only (`vitest run related`). A few seconds. NOT
#                the Tier-2 goldens: cold-importing the engine module graph is
#                ~20-30s, too heavy to pay on every commit.
#   pre-push   — the real gate. Full `npm run check` (lint + the entire vitest
#                suite, which INCLUDES the Tier-2 golden replays). ~80s, paid
#                once before sharing.
#
# Activated by `npm install` (root `prepare` runs `lefthook install`). Both
# hooks are scoped to *.ts/*.tsx staged files, so docs-only commits skip them.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx}"
      run: npm run lint
    test:
      glob: "*.{ts,tsx}"
      run: npx vitest related --run {staged_files}

pre-push:
  commands:
    check:
      run: npm run check
